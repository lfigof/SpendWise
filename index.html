function weekKey(date=new Date()){
  const d=new Date(date);d.setHours(0,0,0,0);
  const dy=d.getDay();d.setDate(d.getDate()-dy+(dy===0?-6:1));
  return localDate(d);
}
function weekLabel(wk){
  const[y,m,dd]=wk.split("-").map(Number);
  const s=new Date(y,m-1,dd),e=new Date(y,m-1,dd+6);
  const f=d=>d.toLocaleDateString("en-AU",{day:"numeric",month:"short"});
  return`${f(s)} – ${f(e)}`;
}
function weeksForMonth(y,mo){
  const set=new Set(),d=new Date(y,mo,1),end=new Date(y,mo+1,0);
  while(d<=end){set.add(weekKey(d));d.setDate(d.getDate()+1);}return[...set].sort();
}
function recentWeeks(n=12){
  const a=[],now=new Date();
  for(let i=0;i<n;i++){const d=new Date(now);d.setDate(d.getDate()-i*7);a.push(weekKey(d));}
  return a;
}

// ── Supabase DB ────────────────────────────────────────────────────────────
async function loadEntries(){
  if(!USER)return;
  setState({loading:true});
  // Get or create shared household
  let{data:profile}=await supa.from("profiles").select("*").eq("id",USER.id).single();
  if(!profile){
    await supa.from("profiles").insert({id:USER.id,email:USER.email,household_id:USER.id});
    profile={id:USER.id,email:USER.email,household_id:USER.id};
  }
  SHARED_ID=profile.household_id;
  // Load budget
  const{data:bdata}=await supa.from("budgets").select("amount").eq("household_id",SHARED_ID).single();
  if(bdata)BUDGET=bdata.amount;
  // Load entries
  const{data:entries}=await supa.from("entries").select("*").eq("household_id",SHARED_ID).order("date",{ascending:false});
  ENTRIES=entries||[];
  setState({loading:false,page:"app"});
}

async function saveEntry(entry){
  const{error}=await supa.from("entries").insert({...entry,household_id:SHARED_ID,user_id:USER.id});

  else setState({syncMsg:"✗ Save failed"});
}

async function removeEntry(id){

// ── Face ID / Biometric ────────────────────────────────────────────────────
const CRED_KEY = "spendwise_cred_id";

async function registerBiometric(){
  try {
    const cred = await navigator.credentials.create({publicKey:{
      challenge: crypto.getRandomValues(new Uint8Array(32)),
      rp:{name:"SpendWise"},
      user:{id:new TextEncoder().encode(USER.id),name:USER.email,displayName:"SpendWise User"},
      pubKeyCredParams:[{type:"public-key",alg:-7},{type:"public-key",alg:-257}],
      authenticatorSelection:{authenticatorAttachment:"platform",userVerification:"required"},
      timeout:60000,
    }});
    if(cred){localStorage.setItem(CRED_KEY,cred.id);return true;}
  } catch(e){console.log("Biometric register failed",e);}
  return false;
}

async function loginWithBiometric(){
  const credId = localStorage.getItem(CRED_KEY);
  if(!credId) return false;
  try {
    const decoded = Uint8Array.from(atob(credId.replace(/-/g,"+").replace(/_/g,"/")),c=>c.charCodeAt(0));
    const assertion = await navigator.credentials.get({publicKey:{
      challenge: crypto.getRandomValues(new Uint8Array(32)),
      allowCredentials:[{type:"public-key",id:decoded}],
      userVerification:"required",
      timeout:60000,
    }});
    return !!assertion;
  } catch(e){console.log("Biometric failed",e);}
  return false;
}

});

// ── HTML builder ───────────────────────────────────────────────────────────
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else if(v!==null&&v!==undefined&&v!==false)el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c===null||c===undefined||c===false)return;
    el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);
  });
  return el;
}
const div=(s,...c)=>h("div",{style:s},...c);
const btn=(s,fn,...c)=>h("button",{style:s,onClick:fn},...c);
const sp=(s,...c)=>h("span",{style:s},...c);

function hl(txt,q){
  const span=document.createElement("span");
  if(!q){span.textContent=txt;return span;}
  const parts=txt.split(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")})`, "gi"));
  parts.forEach((p,i)=>{
    if(i%2===1){const m=document.createElement("mark");m.textContent=p;m.style.cssText=`background:${ACCENT}55;color:${TEXT};border-radius:2px;padding:0 1px;`;span.appendChild(m);}
    else if(p)span.appendChild(document.createTextNode(p));
  });
  return span;
}

function entryRow(entry,highlight=""){
  const cat=catOf(entry);

  const note=entry.note||cat.label;
  const row=h("div",{className:"entry-row"});

  const noteEl=document.createElement("div");noteEl.style.cssText="font-size:13px;color:#D0CCC5;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;";
  noteEl.appendChild(hl(note,highlight));

  meta.textContent=new Date(entry.date+"T12:00:00").toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short",year:"numeric"});
  if(cat.group==="investment")meta.appendChild(sp({marginLeft:"6px",color:GREEN,fontSize:"9px"}," INVEST"));
  if(cat.group==="income")meta.appendChild(sp({marginLeft:"6px",color:BLUE,fontSize:"9px"}," INCOME"));

  row.appendChild(sp({fontSize:"14px",fontWeight:"500",color:amtClr,marginRight:"10px",flexShrink:"0"},(cat.group==="income"?"+":"")+aud(entry.amount)));
  if(state.delConfirm===entry.id){
    row.appendChild(div({display:"flex",gap:"4px"},
      btn({background:RED,border:"none",borderRadius:"5px",color:"#fff",fontSize:"10px",padding:"4px 8px"},()=>removeEntry(entry.id),"del"),
      btn({background:"#2A2A2A",border:"none",borderRadius:"5px",color:DIM,fontSize:"10px",padding:"4px 8px"},()=>setState({delConfirm:null}),"no")
    ));
  } else {
    const db=h("button",{className:"del-btn",style:{background:"none",border:"none",color:MUTED,fontSize:"16px",padding:"2px 6px"},onClick:()=>setState({delConfirm:entry.id})},"×");
    row.appendChild(db);
    row.addEventListener("touchstart",()=>db.style.opacity="1",{passive:true});
    row.addEventListener("mouseleave",()=>db.style.opacity="0");
  }
  return row;
}

function entryList(entries,title,highlight=""){
  const wrap=div({background:CARD,borderRadius:"16px",border:`1px solid ${BORDER}`,overflow:"hidden",marginBottom:"16px"});
  wrap.appendChild(div({padding:"13px 16px",borderBottom:`1px solid ${BORDER}`},sp({fontSize:"10px",color:DIM,letterSpacing:"2px",textTransform:"uppercase"},`${title} (${entries.length})`)));
  if(!entries.length)wrap.appendChild(div({padding:"36px 20px",textAlign:"center",color:"#2A2A2A",fontSize:"13px"},"No entries yet — tap + to add"));
  else[...entries].sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(e=>wrap.appendChild(entryRow(e,highlight)));
  return wrap;
}

function catBreakdown(entries){
  const cats=CATS.map(c=>{const es=entries.filter(e=>e.category===c.id);return{...c,total:sum(es)};}).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);
  if(!cats.length)return document.createDocumentFragment();
  const total=sum(entries);
  const wrap=div({background:CARD,borderRadius:"16px",border:`1px solid ${BORDER}`,overflow:"hidden",marginBottom:"16px"});
  wrap.appendChild(div({padding:"13px 16px",borderBottom:`1px solid ${BORDER}`},sp({fontSize:"10px",color:DIM,letterSpacing:"2px",textTransform:"uppercase"},"By Category")));
  const inner=div({padding:"8px 16px 12px"});
  cats.forEach(cat=>{
    const clr=cat.group==="investment"?GREEN:cat.group==="income"?BLUE:TEXT;
    const row=div({padding:"7px 0"});
    row.appendChild(div({display:"flex",justifyContent:"space-between",marginBottom:"4px"},sp({fontSize:"12px",color:"#D0CCC5"},cat.icon+" "+cat.label),sp({fontSize:"12px",color:clr},aud(cat.total))));
    const track=div({background:"#111",borderRadius:"3px",height:"4px"});
    track.appendChild(div({height:"100%",borderRadius:"3px",background:cat.color,width:`${(cat.total/total)*100}%`,transition:"width 0.6s cubic-bezier(0.16,1,0.3,1)"}));
    row.appendChild(track);inner.appendChild(row);
  });
  wrap.appendChild(inner);return wrap;
}

// ── Export helpers ─────────────────────────────────────────────────────────
function getExpEntries(){
  if(state.expScope==="all")return ENTRIES;
  if(state.expScope==="year")return ENTRIES.filter(e=>new Date(e.date+"T12:00:00").getFullYear()===parseInt(state.expYear));
  return ENTRIES.filter(e=>{const d=new Date(e.date+"T12:00:00");return d.getFullYear()===parseInt(state.expYear)&&d.getMonth()===parseInt(state.expMonth);});
}
function buildCSV(entries){
  const hdr="Date,Category,Group,Note,Amount (AUD)";
  const rows=[...entries].sort((a,b)=>new Date(a.date)-new Date(b.date)).map(e=>{const cat=catOf(e);const note=(e.note||"").replace(/"/g,'""');return`${e.date},"${cat.label}",${cat.group},"${note}",${e.amount.toFixed(2)}`;});
  return[hdr,...rows].join("\n");
}
function doDownload(){

  const yr=state.expYear,mo=new Date(2000,parseInt(state.expMonth),1).toLocaleDateString("en-AU",{month:"short"});
  const suf=state.expScope==="all"?"all":state.expScope==="year"?yr:`${yr}-${mo}`;
  const content=state.expFmt==="json"?JSON.stringify(entries,null,2):buildCSV(entries);

  }catch{
    const a=document.createElement("a");a.href="data:"+mime+";charset=utf-8,"+encodeURIComponent(content);a.download=`spendwise-${suf}.${state.expFmt}`;a.click();
  }
}
function doCopy(){

}

    main.appendChild(navCard(String(state.selYear),`${yEntries.length} entries`,()=>setState({selYear:state.selYear-1}),()=>setState({selYear:state.selYear+1})));
    main.appendChild(statCards([{label:"Income",val:"+"+aud(sum(yEntries.filter(e=>grpOf(e)==="income"))),color:BLUE},{label:"Expenses",val:aud(sum(yEntries.filter(e=>grpOf(e)==="expense"))),color:ACCENT},{label:"Invested",val:aud(sum(yEntries.filter(e=>grpOf(e)==="investment"))),color:GREEN},{label:"Net",val:netStr(netOf(yEntries)),color:netClr(netOf(yEntries))}]));
    const chartCard=div({background:CARD,borderRadius:"16px",border:`1px solid ${BORDER}`,padding:"16px 16px 12px",marginBottom:"14px"});
    chartCard.appendChild(div({fontSize:"10px",color:DIM,letterSpacing:"2px",textTransform:"uppercase",marginBottom:"16px"},"Monthly Breakdown — tap to drill in"));
    const bars=div({display:"flex",alignItems:"flex-end",gap:"4px",height:"90px"});
    ymData.forEach(m=>{const h2=maxYM>0?Math.max(3,(m.total/maxYM)*90):3;const isCur=m.m===today.getMonth()&&state.selYear===today.getFullYear();const col=div({flex:"1",display:"flex",flexDirection:"column",alignItems:"center",cursor:"pointer",gap:"4px"});col.appendChild(div({width:"100%",height:`${h2}px`,borderRadius:"3px 3px 0 0",background:isCur?ACCENT:m.total>0?"#2E2E2E":"#1A1A1A"}));col.appendChild(div({fontSize:"8px",color:isCur?ACCENT:DIM},m.lbl));col.addEventListener("click",()=>setState({selMonth:m.m,view:"month"}));bars.appendChild(col);});
    chartCard.appendChild(bars);main.appendChild(chartCard);main.appendChild(catBreakdown(yEntries));
  }

  // All time
  if(state.view==="overview"){
    const incT=sum(ENTRIES.filter(e=>grpOf(e)==="income")),expT=sum(ENTRIES.filter(e=>grpOf(e)==="expense")),invT=sum(ENTRIES.filter(e=>grpOf(e)==="investment"));
    const netT=incT-expT-invT,wkCnt=new Set(ENTRIES.map(e=>weekKey(new Date(e.date+"T12:00:00")))).size;
    const sumCard=div({background:CARD,borderRadius:"16px",border:`1px solid ${BORDER}`,padding:"18px",marginBottom:"14px"});
    sumCard.appendChild(div({fontSize:"10px",color:DIM,letterSpacing:"2px",textTransform:"uppercase",marginBottom:"14px"},"Lifetime Summary"));
    const grid=div({display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"});
    [{label:"Total Income",val:"+"+aud(incT),color:BLUE},{label:"Total Expenses",val:aud(expT),color:ACCENT},{label:"Total Invested",val:aud(invT),color:GREEN},{label:"Net",val:netStr(netT),color:netClr(netT)},{label:"Avg Spend/Week",val:aud(wkCnt>0?expT/wkCnt:0),color:TEXT},{label:"Transactions",val:String(ENTRIES.length),color:TEXT}].forEach(({label,val,color})=>{grid.appendChild(div({background:"#111",borderRadius:"10px",padding:"13px"},div({fontSize:"9px",color:MUTED,letterSpacing:"2px",textTransform:"uppercase",marginBottom:"5px"},label),div({fontFamily:"'Syne',sans-serif",fontWeight:"800",fontSize:"17px",color,letterSpacing:"-0.5px"},val)));});
    sumCard.appendChild(grid);main.appendChild(sumCard);
    if(yrs.length){
      const yrCard=div({background:CARD,borderRadius:"16px",border:`1px solid ${BORDER}`,padding:"18px",marginBottom:"14px"});
      yrCard.appendChild(div({fontSize:"10px",color:DIM,letterSpacing:"2px",textTransform:"uppercase",marginBottom:"14px"},"By Year — tap to drill in"));
      const maxYT=Math.max(...yrs.map(yr=>sum(ENTRIES.filter(e=>new Date(e.date+"T12:00:00").getFullYear()===parseInt(yr)))),1);
      yrs.forEach(yr=>{
        const yEnt=ENTRIES.filter(e=>new Date(e.date+"T12:00:00").getFullYear()===parseInt(yr));
        const yInc=sum(yEnt.filter(e=>grpOf(e)==="income")),yExp=sum(yEnt.filter(e=>grpOf(e)==="expense")),yInv=sum(yEnt.filter(e=>grpOf(e)==="investment"));
        const pct=maxYT>0?(sum(yEnt)/maxYT)*100:0;
        const row=div({marginBottom:"16px",cursor:"pointer"});
        const top=div({display:"flex",justifyContent:"space-between",marginBottom:"5px",alignItems:"baseline"});
        top.appendChild(sp({fontSize:"14px",color:parseInt(yr)===today.getFullYear()?ACCENT:TEXT,fontFamily:"'Syne',sans-serif",fontWeight:"700"},yr));
        const amts=div({display:"flex",gap:"8px"});
        if(yInc>0)amts.appendChild(sp({fontSize:"10px",color:BLUE},"+"+aud(yInc)));
        if(yExp>0)amts.appendChild(sp({fontSize:"10px",color:ACCENT},aud(yExp)));
        if(yInv>0)amts.appendChild(sp({fontSize:"10px",color:GREEN},aud(yInv)));
        top.appendChild(amts);row.appendChild(top);
        const trk=div({background:"#111",borderRadius:"3px",height:"5px"});trk.appendChild(div({height:"100%",borderRadius:"3px",background:parseInt(yr)===today.getFullYear()?ACCENT:"#2A2A2A",width:`${pct}%`}));row.appendChild(trk);
        row.appendChild(div({fontSize:"9px",color:MUTED,marginTop:"3px"},`${yEnt.length} entries`));
        row.addEventListener("click",()=>setState({selYear:parseInt(yr),view:"year"}));yrCard.appendChild(row);
      });
      main.appendChild(yrCard);
    }
    main.appendChild(catBreakdown(ENTRIES));
  }

  app.appendChild(main);
}

function renderSearchResults(panel){
  while(panel.children.length>2)panel.removeChild(panel.lastChild);
  if(!state.searchQ.trim())return;
  const q=state.searchQ.toLowerCase();
  const res=ENTRIES.filter(e=>(e.note||"").toLowerCase().includes(q)||catOf(e).label.toLowerCase().includes(q)||e.date.includes(q)||String(e.amount).includes(q)).sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(!res.length){panel.appendChild(div({padding:"20px 0",textAlign:"center",color:"#2A2A2A",fontSize:"12px"},`No results for "${state.searchQ}"`));}
  else{const rBox=div({background:"#111",borderRadius:"10px",overflow:"hidden",border:`1px solid ${BORDER}`});rBox.appendChild(div({padding:"10px 14px",borderBottom:`1px solid ${BORDER}`,fontSize:"9px",color:DIM,letterSpacing:"2px",textTransform:"uppercase"},`${res.length} result${res.length!==1?"s":""}`));res.forEach(e=>rBox.appendChild(entryRow(e,state.searchQ)));panel.appendChild(rBox);}
}

async function doAdd(){
  const amount=parseFloat(state.formAmt);
  if(!amount||amount<=0)return;
  const entry={id:crypto.randomUUID(),amount,category:state.formCat,note:state.formNote.trim(),date:state.formDate,created_at:new Date().toISOString()};
  await saveEntry(entry);
}

render();
</script>
</body>
</html>
